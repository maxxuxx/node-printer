name: Publish

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

jobs:
  publish:
    if: github.repository == 'maxxuxx/node-printer' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Download x64 prebuild
        uses: actions/download-artifact@v4
        with:
          name: winspool-prebuild-win32-x64
          path: apps/printer/prebuilds/win32-x64
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ia32 prebuild
        uses: actions/download-artifact@v4
        with:
          name: winspool-prebuild-win32-ia32
          path: apps/printer/prebuilds/win32-ia32
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download arm64 prebuild
        uses: actions/download-artifact@v4
        with:
          name: winspool-prebuild-win32-arm64
          path: apps/printer/prebuilds/win32-arm64
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify
        run: corepack pnpm run verify

      - name: Check published version
        id: package
        shell: bash
        run: |
          name="$(node -p "require('./apps/printer/package.json').name")"
          version="$(node -p "require('./apps/printer/package.json').version")"

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if npm view "$name@$version" version > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.package.outputs.published == 'false'
        working-directory: apps/printer
        run: npm publish --access public

      - name: Skip existing version
        if: steps.package.outputs.published == 'true'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published"
