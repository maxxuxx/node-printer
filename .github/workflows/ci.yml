name: CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "libs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "eslint.config.js"
      - "vitest.config.ts"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "apps/**"
      - "libs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "eslint.config.js"
      - "vitest.config.ts"
      - ".github/workflows/ci.yml"

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22.x
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Test
        run: corepack pnpm test

      - name: Build
        run: corepack pnpm build

  prebuild-winspool:
    name: Winspool prebuild ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - ia32
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build package
        run: corepack pnpm --filter @maxxuxx/node-printer build

      - name: Build prebuild (${{ matrix.arch }})
        run: corepack pnpm --filter @maxxuxx/node-printer prebuild:${{ matrix.arch }}

      - name: Check prebuild output
        shell: pwsh
        run: |
          $path = "apps/printer/prebuilds/win32-${{ matrix.arch }}/@node-printer+winspool.node"

          if (-not (Test-Path $path)) {
            throw "Missing $path"
          }

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: winspool-prebuild-win32-${{ matrix.arch }}
          path: apps/printer/prebuilds/win32-${{ matrix.arch }}/@node-printer+winspool.node
          if-no-files-found: error

  pack-winspool:
    name: Winspool package contents
    runs-on: windows-2022
    needs: prebuild-winspool
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build package
        run: corepack pnpm --filter @maxxuxx/node-printer build

      - name: Download prebuild artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download ${{ github.run_id }} --name winspool-prebuild-win32-x64 --dir apps/printer/prebuilds/win32-x64
          gh run download ${{ github.run_id }} --name winspool-prebuild-win32-ia32 --dir apps/printer/prebuilds/win32-ia32
          gh run download ${{ github.run_id }} --name winspool-prebuild-win32-arm64 --dir apps/printer/prebuilds/win32-arm64

      - name: Check package contents
        run: corepack pnpm --filter @maxxuxx/node-printer pack:check
